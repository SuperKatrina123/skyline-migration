    - "Skyline 下点击 Tab 精准锚定到目标模块上方吸顶导航栏处"
    - "Skyline 下手指正常滚动，范围覆盖全页面内容"
    - "WebView 下 tab 锚定和滚动行为不变"
    - "iOS / Android 双端验证"
    - "AB 回退验证"
    - "非微信端回归（H5/CRN 不受影响）"
  result: "pending"
  devices:
    - "iOS（真机待验证）"
    - "Android（真机待验证）"
  notes: "代码已修复待真机验证。cacheExtent 和 ScrollViewContext.scrollTo() 需在 Skyline 真机确认定位精度和滚动范围正常。如有偏差可能需要调整 cacheExtent 值或优化 scrollTo duration。"
resolution:
  root_cause: |
    Skyline type="list" 虚拟列表下：
    1. scroll-top prop 程序化滚动定位精度不足，配合 boundingClientRect.top + scrollY 的偏移量计算在虚拟列表坐标体系中产生偏差
    2. 无 cache-extent 时 off-screen item 未渲染到 DOM，总内容高度估算过小导致极短滚动即达底部
  fix_summary:
    - "PageContent/index.mini.tsx: XScrollView 添加 cacheExtent={2000} 预渲染 off-screen 内容以修正高度估算；添加 id='detail-scroll-view' 供 ScrollViewContext 获取"
    - "useScrollTo/index.mini.ts: 改用 ScrollViewContext.scrollTo({ top, duration, animated }) 代替 scrollTop prop 进行程序化滚动；保留 setScrollTop 降级方案"
  changed_files:
    - "src/pages/hoteldetail/detail/components/PageContent/index.mini.tsx"
    - "src/pages/hoteldetail/detail/utils/hooks/useScrollTo/index.mini.ts"
  reusable_rule: |
    Skyline type="list" 下：(1) 程序化滚动必须使用 ScrollViewContext.scrollTo() 而非 scroll-top prop；(2) 必须设置 cache-extent 确保内容高度估算准确；(3) scroll-view 需加 id 属性以便 NodesRef.node() 获取 ScrollViewContext。
case_output:
