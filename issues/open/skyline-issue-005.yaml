analysis:
  likely_root_cause: "z-index 不是根因。加 position:relative + zIndex:9999 + SCREEN_HEIGHT fallback 后浮层仍不可见且无报错。疑似 CFfilterQuickLayerContainer 内部 filterLayerCategory 状态未被正确更新为 RoomFilter/SubFilter（返回 null 不渲染），或外部包 module-level getSystemInfoSync 导致 WINDOW_HEIGHT/SCREEN_HEIGHT 为 0，layerHeight 负数不可见。需 console 打桩或真机调试进一步排查。"
  confidence: "low"
  fix_direction_hypothesis: |
    给 FilterBarLayerContainer/index.mini.tsx 的外层 View 添加 position:relative 和 zIndex（如 1000 或更高），使其在 __xtaro__root__ 层级参与兄弟 z-index 层叠。
    ```tsx
    <View style={{ position: 'relative', zIndex: 1000 }}>
    ```
  open_questions:
    - "是否会影响其他已正常工作浮层的层叠顺序"
    - "zIndex 取 1000 还是更高值"
    - "此模式是否在 PriceLayerContainer 等同类组件也存在"
  inferred_rules:
    - "疑似 Skyline 下 z-index 仅作用于兄弟节点，嵌套在无 z-index 容器内的 position:absolute 元素需在父容器设置 z-index 才能在 page 层级参与层叠"
  impact_scope: |
    影响酒店详情页筛选功能，属于核心交互路径。修复范围限定在 FilterBarLayerContainer/index.mini.tsx。
