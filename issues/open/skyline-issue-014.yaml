analysis:
  likely_root_cause: |
    WebView 下 onScroll 回调虽然也在逻辑线程，但 WebView 使用原生滚动 + GPU 合成，opacity/transform 动画由合成器处理不影响主线程。Skyline 下：
    1. 显隐效果由 onScroll → setPopHeaderOpacity/setState 驱动，每次滚动触发 setState → re-render → 逻辑线程阻塞 → 帧率下降
    2. #007 修复的物理房型吸顶使用 transform:translateY + transition，transition 虽然由 GPU 处理，但触发时机（由 onScroll 计算出 translateY 值）仍在逻辑线程，导致更新延迟和跳变
    3. Skyline 推荐使用 worklet（UI 线程）处理 scroll-driven 动画，当前实现完全依赖逻辑线程

    需将 scroll-driven 动画迁移到 worklet 回调（Worklet 动画系统）。
  confidence: "high"
  inferred_rules:
    - "Skyline 下 scroll-driven opacity/transform 动画应使用 worklet:onscrollupdate 在 UI 线程执行，而非 onScroll + setState"
  evidence:
    - type: "code_signal"
      description: "popHeaderOpacity 通过 onScroll → setPopHeaderOpacity 驱动，每次 setState 导致 re-render"
      file: "src/pages/hoteldetail/detail/components/RoomList/RoomListLayer/index.tsx"
      snippet: "const [popHeaderOpacity, setPopHeaderOpacity] = useState(0); ... onScroll={handleOnScroll}"
