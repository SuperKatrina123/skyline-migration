  notes: "用户编译验证通过，高度和蒙层均已正常"
resolution:
  root_cause: "PriceLayerContainer 渲染 PriceLayer 时未传递 isSkyline prop，导致 PriceLayer 在 Skyline 下使用了默认 animationType='direction'（依赖 wx.createAnimation），造成动画失败、高度计算异常、蒙层不渲染。"
  fix_summary:
    - "PriceLayerContainer/index.tsx:139 — 给 <PriceLayer> 添加 isSkyline prop，激活 PriceLayer 内部的 Skyline 兼容模式（animationType='none' + CSS @keyframes 替代 wx.createAnimation）"
  changed_files:
    - "src/pages/hoteldetail/detail/components/PriceLayerContainer/index.tsx"
  reusable_rule: "使用 XPoplayer/PopLayer 的组件在 Skyline 下必须设置 animationType='none' 并用 CSS @keyframes 替代内置动画。调用外部包组件时，需传递渲染器类型（isSkyline prop）以启用内部 Skyline 兼容模式。"
