verification:
  checklist:
    - "给 albumTab 添加显式 width 或 right 约束，验证 Skyline 下宽度恢复"
    - "验证 WebView 下表现不变"
    - "验证多 tab（>3个）时滚动功能正常"
  result: "pending"
  devices:
