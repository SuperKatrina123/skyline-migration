    - "Android 真机验证"
  result: "passed"
  devices: []
  notes: "开发工具模拟器验证通过。PhysicalRoomCard 和 IncapableHeader 在 Skyline type='list' scroll-view 中使用 transform:translateY 替代 position:sticky，视觉吸顶正常，存在微抖动通过 transition:transform 0.02s 消除。"
resolution:
  root_cause: "Skyline 不支持 CSS position: sticky。PhysicalRoomCard 的容器样式 baseRoomCardContainer 和 IncapableHeader 的 unRoomHeaderLine / unRoomHeader 均使用了 position: 'sticky'，在 Skyline 下被忽略，导致吸顶完全失效。"
  fix_summary:
    - "PhysicalRoomCard/index.tsx: 当 roomState.stickyState === StickyState.Sticky 时，对 ScrollTarget 容器应用 transform:translateY(${scrollY - stickyStart}px)，利用 transform 不会改变布局框位置的特性，让虚拟化 scroll-view 的 virtualizer 仍能识别元素在正常流中，同时视觉上保持在视口顶部"
    - "IncapableHeader/index.tsx: 通过 totalHeightAboveRoomListAtomFamily 读取吸顶触发点（与 isStickyStatus atom 同源计算），当吸顶时应用 transform:translateY(${scrollY - triggerPoint}px)，实现与 PhysicalRoomCard 相同的效果"
    - "PhysicalRoomCard + IncapableHeader: 添加 transition:transform 0.02s linear，平滑因 JS 桥接延迟导致的帧间跳变"
    - "position:sticky 在 WebView 端保持不动，不产生影响"
  changed_files:
    - "src/pages/hoteldetail/detail/modules/FirstScreen/RoomListModule/Components/PhysicalRoomCard/index.tsx"
    - "src/pages/hoteldetail/detail/modules/FirstScreen/RoomListModule/Components/IncapableHeader/index.tsx"
  reusable_rule: "Skyline 下吸顶效果不能使用 CSS position: sticky。若元素位于 type='list' 虚拟化 scroll-view 中，需使用 JS 驱动的 transform: translateY() 替代：保持元素在 normal flow 中供 virtualizer 识别，通过 translateY 做视觉偏移。同时添加 transition: transform 0.02s 消除 JS 桥接延迟导致的帧间抖动。若元素不在虚拟化列表中，可考虑 position: fixed。"
case_output:
  should_write_to_kb: true
  target_file: "knowledge/rules/skyline-sticky-alternative.md"
uncertainty:
  why_might_be_wrong:
    - "transform:translateY 依赖于 scrollYAtom 的更新频率，如果 scrollYAtom 更新不够频繁或 React 渲染跟不上，仍可能有轻微抖动"
    - "transition:0.02s 可能在某些低端设备上导致视觉滞后感"
  missing_evidence:
    - "未在真机 iOS/Android 上验证"
