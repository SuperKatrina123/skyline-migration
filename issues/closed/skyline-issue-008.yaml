analysis:
  likely_root_cause: |
    疑似 Skyline type="list" 虚拟列表的坐标体系与 WebView 不同：
    1. scroll-top prop 在虚拟列表中的定位精度不如 ScrollViewContext.scrollTo()
    2. 无 cache-extent 时 off-screen item 未渲染，总内容高度估算过小导致滚动范围异常
    3. stickyHeaderHeight 的模块高度实测值与 Skyline 渲染值可能存在差异
  confidence: "medium"
  fix_direction_hypothesis: |
    PageContent/index.mini.tsx:
    - 给 XScrollView 添加 cacheExtent={2000}，预渲染 off-screen 内容以正确估算总高度
    - 添加 id="detail-scroll-view" 用于 ScrollViewContext 获取

    useScrollTo/index.mini.ts:
    - 通过 wx.createSelectorQuery().select('#detail-scroll-view').node() 获取 ScrollViewContext
    - 改用 ScrollViewContext.scrollTo({ top, duration, animated }) 代替 scrollTop prop
    - 保留 setScrollTop fallback 用于 ScrollViewContext 未就绪场景

    实测验证 ScrollViewContext.scrollTo() 的定位精度和 cacheExtent 对滚动范围的影响。
  inferred_rules:
    - "Skyline type=\"list\" 下程序化滚动应使用 ScrollViewContext.scrollTo() 而非 scroll-top prop"
    - "Skyline type=\"list\" 应设置 cache-extent 以确保内容高度估算准确"
  impact_scope: |
    影响酒店详情页所有 Tab 锚定交互和页面滚动体验，属于核心交互路径。
