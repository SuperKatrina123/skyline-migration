analysis:
  likely_root_cause: |
    #008 修复代码（useScrollTo/index.mini.ts）使用 ResizeObserver 或 boundingClientRect 计算 offset，但 formula 在 Skyline type='list' 虚拟列表中可能有偏差：
    1. boundingClientRect.top 在虚拟列表中可能返回相对于 scroll-view 内容区的偏移（而非视口），导致 +scrollY 后重复累加
    2. stickyHeaderHeight 在 Skyline 下的实际渲染高度可能与 getBoundingClientRect 测量值不一致
    3. cacheExtent={2000} 只能解决内容高度估算，不直接影响 scrollTo 坐标精度

    当前计算逻辑：
    ```
    targetTop = res.top + scrollY - stickyHeaderHeight
    ```
    需要确认 Skyline 下 res.top 和 scrollY 的参考坐标系是否与 WebView 一致。
