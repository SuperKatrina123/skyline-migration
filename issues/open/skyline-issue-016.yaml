fix:
  approach: >
    1. HotelProduct/style.ts: productName style 添加 overflow:'hidden'，与 numberOfLines={2} 配合截断
    2. DescMeasure/style.ts: descText style 添加 overflow:'hidden' + whiteSpace:'nowrap'，
       与已有的 textOverflow:'ellipsis' 配合实现单行打点。Skyline 下这三个属性必须在同一元素上。
    3. FlatSaleRoomName/style.ts: roomNameText style 添加 overflow:'hidden'，
       防止文字在 view 组件中最后一行可见溢出。wordBreak:'break-all' 已支持不需改动。
  changed_files:
