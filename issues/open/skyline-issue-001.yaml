analysis:
  likely_root_cause: "疑似 Skyline 下 absolute 定位元素不支持 shrink-to-fit（WebView 的 intrinsic sizing 行为），导致容器没有被子内容撑开宽度"
  confidence: "high"
  fix_direction_hypothesis: "可能需要在 JS 层根据 tab 数量动态计算宽度，不能写死（tabItem 个数由服务端下发）"
  open_questions:
    - "是否有 XTaro 原生 API 获取子元素渲染后宽度"
    - "是否可以通过 onLayout 回调动态设置"
  inferred_rules:
    - "Skyline 下 position:absolute 元素疑似不支持 shrink-to-fit，需要显式宽度"
    - "enableScrollViewAutoSize 可能只影响 scroll-view 非滚动方向的尺寸，不解决父容器宽度问题"
  constraints:
    - "width 不能写死——tabItem 个数由服务端下发，是动态的"
  failed_attempts:
    - approach: "albumTab 加 right:16（让 left+right 隐式计算宽度）"
      reason: "Skyline 下 absolute 元素的 left+right 不会计算出宽度"
    - approach: "albumTab 加 width: WINDOW_WIDTH - 32（固定屏幕宽度）"
      reason: "tabContainer 会拉满到 maxWidth:480，背景色超出实际内容宽度，不符合 UI 预期"
    - approach: "albumTab 加 display:flex + flexDirection:row（期望 flex 容器 shrink-to-fit）"
      reason: "Skyline 下 absolute + flex 容器同样不支持 shrink-to-fit"
    - approach: "tabListContainer（XScrollView）加 flex:1"
      reason: "父容器本身没有宽度，flex:1 也无法撑开"
    - approach: "XScrollView 加 type='list'"
      reason: "type 属性解决的是 Skyline scroll-view 渲染模式，不解决宽度问题"
verification_checklist_draft:
  - "Skyline 下 tab 栏宽度被内容正确撑开"
  - "WebView 下表现不变"
  - "多 tab（>3个）时宽度和滚动功能正常"
  - "maxWidth:480 边界 case（tab 足够多时不超出）"
  - "iOS / Android 双端验证"
  - "AB 回退验证（关闭实验后无异常）"
  - "非微信端回归（H5/CRN 不受影响）"
verification:
