analysis:
  likely_root_cause: >
    三个独立的 Skyline CSS 兼容性问题：
    1. 标题溢出：productName 使用 wordBreak:'break-word'，Skyline 不支持 break-word，映射为 normal，
       导致文字不换行溢出。同时缺少 overflow:'hidden'，numberOfLines={2} 无法正常截断。
    2. 明细不打点：descText 的 textOverflow:'ellipsis' 所在的元素缺少 overflow:'hidden' 和 whiteSpace:'nowrap'。
       Skyline 下 text-overflow:ellipsis 需要这三个属性在同一元素上才能生效，而目前 overflow/whiteSpace 在父 view 上。
    3. 钟点房房型名称溢出：roomNameText 使用 wordBreak:'break-all'（Skyline 支持），且文字在 XViewExposure（view 组件）中渲染，
       缺少 overflow:'hidden' 导致最后一行超出容器边界时可见溢出。Skyline 下 text-overflow:ellipsis 仅在 text 组件上生效，
       view 组件需用 overflow:hidden 至少保证不溢出。
  confidence: "high"
  inferred_rules:
    - "Skyline 下 word-break 不支持 break-word（映射为 normal），需改用 break-all 或 accept normal 行为"
    - "Skyline 下 text-overflow:ellipsis 必须在同一元素上同时设置 overflow:hidden + white-space:nowrap"
    - "Skyline 下 view 组件不支持 text-overflow:ellipsis，需用 overflow:hidden 防止可见溢出，或改用 text 组件"
  evidence:
