analysis:
  likely_root_cause: "PriceLayerContainer 未传递 isSkyline prop 给 PriceLayer，导致 PriceLayer 使用默认 animationType='direction'（wx.createAnimation），Skyline 下动画不执行且布局异常。同时 PriceDetail 中的 Skyline 专用 height 计算也因 isSkyline 为 false 而未激活。"
  confidence: "high"
  fix_direction_hypothesis: |
    PriceLayerContainer/index.tsx 中给 PriceLayer 添加 isSkyline prop（已修复 ✅）：
    ```tsx
    <PriceLayer
        isSkyline
        // ...existing props
    >
    ```
    这将激活 PriceLayer 内部的 Skyline 兼容模式：animationType='none' + CSS @keyframes 替代 wx.createAnimation，以及 PriceDetail 中的 Skyline 专用 height 计算。
    对于蒙层缺失问题，可能需要更深层排查 XPoplayer 在 Skyline 下的 mask 渲染行为。
  open_questions:
    - "添加 isSkyline 后 PriceLayer 的 CSS popLayerAnimate 动画是否生效？（已有 @keyframes fadeInDownContainer 定义）"
    - "XPoplayer 的蒙层在 Skyline 下是否根本不可渲染？还是需要特殊的 z-index/position 设置？"
    - "isSkyline 是硬编码还是需要通过 AB 实验 / renderer 检测动态传入？"
    - "WebView 下回归验证是否正常？"
  inferred_rules:
    - "使用 XPoplayer/PopLayer 的组件在 Skyline 下需要设置 animationType='none' 并用 CSS @keyframes 替代内置动画"
    - "调用方需要在渲染外部组件时传递渲染器类型（isSkyline 等）以确保子组件正确启用 Skyline 兼容模式"
  impact_scope: |
    影响酒店详情页货架价格浮层的高度显示和蒙层遮罩，属于视觉异常（非崩溃阻断）。修复范围限定在 PriceLayerContainer/index.tsx（传递 isSkyline prop）。
verification:
  checklist:
    - "Skyline 下价格浮层高度正确"
    - "蒙层（mask）正常显示"
    - "浮层弹出动画正常"
