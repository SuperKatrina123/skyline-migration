    - "真机 iOS"
    - "真机 Android"
  notes: ""
resolution:
  root_cause: "Skyline 下 absolute 定位元素不支持 shrink-to-fit（WebView 的 intrinsic sizing 行为），容器没有被子内容撑开宽度"
  fix_direction: "需要在 JS 层根据 tab 数量动态计算宽度"
  fix_summary: []
  changed_files: []
  reusable_rule: "Skyline 下 position:absolute 元素需要动态计算 width，不能依赖内容撑开"
  constraints:
    - "width 不能写死——tabItem 个数由服务端下发，是动态的"
  failed_attempts:
    - approach: "albumTab 加 right:16（让 left+right 隐式计算宽度）"
      reason: "Skyline 下 absolute 元素的 left+right 不会计算出宽度"
    - approach: "albumTab 加 width: WINDOW_WIDTH - 32（固定屏幕宽度）"
      reason: "tabContainer 会拉满到 maxWidth:480，背景色超出实际内容宽度，不符合 UI 预期"
    - approach: "albumTab 加 display:flex + flexDirection:row（期望 flex 容器 shrink-to-fit）"
      reason: "Skyline 下 absolute + flex 容器同样不支持 shrink-to-fit"
    - approach: "tabListContainer（XScrollView）加 flex:1"
      reason: "父容器本身没有宽度，flex:1 也无法撑开"
    - approach: "XScrollView 加 type='list'"
      reason: "type 属性解决的是 Skyline scroll-view 渲染模式，不解决宽度问题"
case_output:
  should_write_to_kb: true
  target_file: "knowledge/cases/absolute-shrink-to-fit.md"
uncertainty:
  why_might_be_wrong:
    - "可能不是 absolute shrink-to-fit 问题，而是 overflow:hidden 在 Skyline 下裁切了内容"
    - "enableScrollViewAutoSize 可能需要 scroll-view 本身无 width 限制才能生效"
  missing_evidence:
    - "需要在开发者工具 Skyline 面板查看实际计算宽度"
    - "需要验证去掉 maxWidth:480 后是否正常"
