      file: "src/pages/hoteldetail/detail/modules/SecondScreen/InStoreModule/Components/HotelProduct/PackageDesc/DescMeasure/style.ts"
      snippet: "descText: { textOverflow: 'ellipsis', ... }"
    - type: "code_signal"
      description: "overflow/whiteSpace 在父 view (desc) 上而非 text 元素上，Skyline 下不生效"
      file: "src/pages/hoteldetail/detail/modules/SecondScreen/InStoreModule/Components/HotelProduct/PackageDesc/DescMeasure/style.ts"
      snippet: "desc: { overflow: 'hidden', whiteSpace: 'nowrap' }"
    - type: "code_signal"
